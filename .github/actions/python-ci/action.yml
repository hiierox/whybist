name: Python CI setup
description: Setup Python, Poetry and install dev dependencies

inputs:
  service-path:
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - run: pip install poetry
      shell: bash

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pypoetry
          ~/.virtualenvs
        key: poetry-${{ runner.os }}-${{ hashFiles(format('{0}/poetry.lock', inputs.service-path)) }}

    - run: poetry install --no-interaction --no-root
      working-directory: ${{ inputs.service-path }}
      shell: bash