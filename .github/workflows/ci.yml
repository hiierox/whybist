name: CI

on:
  workflow_dispatch:
  push:
    paths:
      - "services/auth/**"
  pull_request:
    paths:
      - "services/auth/**"

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/python-ci
        with:
          service-path: services/auth

      - name: Ruff check
        run: poetry run ruff check src
        working-directory: services/auth


  typecheck:
    name: Mypy typecheck
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/python-ci
        with:
          service-path: services/auth

      - name: Mypy
        run: poetry run mypy src
        working-directory: services/auth

  tests:
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: postgresql://test:test@localhost:5433/test
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/python-ci
        with:
          service-path: services/auth

      - name: Start test DB
        run: docker compose up -d postgres-test

      - name: Wait for DB
        run: |
          for i in {1..20}; do
            docker compose exec -T postgres-test pg_isready && exit 0
            sleep 2
          done
          exit 1

      - name: Run tests
        run: poetry run pytest
        working-directory: services/auth

      - name: Stop containers
        if: always()
        run: docker compose down -v