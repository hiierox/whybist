name: CI

on:
  push:
    paths:
      - "services/auth/**"
  pull_request:
    paths:
      - "services/auth/**"

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/python-ci
        with:
          service-path: services/auth

      - name: Ruff check
        run: poetry run ruff check src
        working-directory: services/auth


  typecheck:
    name: Mypy typecheck
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/python-ci
        with:
          service-path: services/auth

      - name: Mypy
        run: poetry run mypy src
        working-directory: services/auth