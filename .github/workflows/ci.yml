name: CI

on:
  push:
    path:
      - "services/auth/**"
  pull_request:
    path:
     - "services/auth/**"

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install poetry
        run: pip install poetry

      - name: Cache poetry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.virtualenvs
          key: poetry-${{ runner.os }}-${{ hashFiles('services/auth/poetry.lock') }}

      - name: Install dependencies
        working-directory: services/auth
        run: poetry install --no-interaction --no-root

      - name: Ruff check
        working-directory: services/auth
        run: poetry run ruff check src


  typecheck:
    name: Mypy typecheck
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install poetry
        run: pip install poetry

      - name: Cache poetry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.virtualenvs
          key: poetry-${{ runner.os }}-${{ hashFiles('services/auth/poetry.lock') }}

      - name: Install dependencies
        working-directory: services/auth
        run: poetry install --no-interaction --no-root

      - name: Mypy
        working-directory: services/auth
        run: poetry run mypy src