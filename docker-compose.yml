services:
  postgres-auth:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    env_file: .env_auth_db
  
  postgres-test:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test

  auth-service:
    build: 
      context: ./services/auth
      dockerfile: Dockerfile
    command: >
      sh -c "python -m alembic upgrade head &&
            python -m uvicorn app.service:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    ports:
      - "8001:8000"
    depends_on:
      - postgres-auth
    env_file:
      - .env_auth_db
      - services/auth/.env
      
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
